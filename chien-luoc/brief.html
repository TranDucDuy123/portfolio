<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Yêu Cầu Dự Án - Đức Duy</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] }, 
                    colors: { neon: { cyan: '#00e5ff' }, brutal: '#0f0f0f' }, 
                    boxShadow: { 'brutal-cyan': '6px 6px 0px 0px #00e5ff' } 
                } 
            } 
        }
    </script>
    <style> 
        body { background-color: #0f0f0f; color: #ffffff; overflow-x: hidden; } 
        @media screen and (max-width: 768px) { input, textarea { font-size: 16px !important; } } 
        .bg-grid { background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="font-sans bg-grid relative min-h-screen flex flex-col">
    
    <!-- NAVIGATION -->
    <nav class="fixed top-0 left-0 w-full bg-brutal/90 backdrop-blur-md z-50 border-b-4 border-white h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 sm:gap-3 group">
                <div class="w-10 h-10 md:w-12 md:h-12 bg-neon-cyan border-2 border-white rounded-lg flex items-center justify-center shadow-[4px_4px_0_0_#fff] group-hover:-rotate-12 transition-transform">
                    <i data-lucide="zap" class="text-black fill-black w-5 h-5"></i>
                </div>
                <div class="flex flex-col">
                    <span class="font-display font-extrabold text-lg sm:text-xl md:text-2xl uppercase tracking-tighter leading-none">ĐỨC DUY</span>
                </div>
            </a>
            <div class="hidden lg:flex items-center gap-6 font-display font-bold text-sm uppercase">
                <a href="index.html" class="hover:text-neon-cyan transition-colors text-white">Trang Chủ</a>
                <a href="brief.html" class="bg-neon-cyan text-black px-6 py-2 border-2 border-white shadow-[4px_4px_0_0_#fff]">GỬI YÊU CẦU</a>
            </div>
            <!-- Mobile Go Back -->
            <a href="index.html" class="lg:hidden flex items-center gap-2 text-xs font-bold uppercase text-white/50 hover:text-neon-cyan">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Quay Lại
            </a>
        </div>
    </nav>

    <!-- FORM NỘI DUNG -->
    <main class="flex-1 pt-28 md:pt-32 pb-16 md:pb-24 max-w-4xl mx-auto px-4 sm:px-6 w-full flex flex-col justify-center">
        <div class="bg-[#111] border-4 border-white p-6 sm:p-8 md:p-12 rounded-3xl md:rounded-[3rem] shadow-brutal-cyan relative overflow-hidden">
            <!-- Deco -->
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-neon-cyan/20 blur-[50px] rounded-full pointer-events-none"></div>

            <div class="mb-8 md:mb-10 border-b-2 border-white/10 pb-6 relative z-10">
                <div class="inline-flex items-center gap-2 px-3 py-1 border-2 border-white rounded-full font-display font-bold uppercase text-[10px] bg-neon-cyan text-black mb-4">
                    <i data-lucide="clipboard-edit" class="w-3 h-3"></i> Project Brief
                </div>
                <h2 class="text-4xl md:text-6xl font-display font-extrabold uppercase leading-none text-white tracking-tighter">
                    KHỞI TẠO <br><span class="text-neon-cyan">DỰ ÁN MỚI</span>
                </h2>
                <p class="text-sm md:text-base text-white/50 mt-4 font-medium">Vui lòng cung cấp sơ bộ thông tin để Đức Duy có thể chuẩn bị giải pháp tốt nhất trước khi tư vấn cho bạn.</p>
            </div>

            <div class="space-y-5 md:space-y-6 font-sans relative z-10">
                
                <!-- HỌ TÊN & SĐT -->
                <div class="grid md:grid-cols-2 gap-5 md:gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="font-display font-bold text-sm text-white/80 uppercase">Họ và Tên / Đơn vị</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/30"></i>
                            <input type="text" id="client-name" class="w-full py-3 pl-12 pr-4 bg-[#0a0a0a] border-2 border-white/20 rounded-xl text-white focus:border-neon-cyan outline-none transition-colors" placeholder="VD: Anh Nam - Garage Auto...">
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="font-display font-bold text-sm text-white/80 uppercase">Số điện thoại (Zalo)</label>
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/30"></i>
                            <input type="tel" id="client-phone" class="w-full py-3 pl-12 pr-4 bg-[#0a0a0a] border-2 border-white/20 rounded-xl text-white focus:border-neon-cyan outline-none transition-colors" placeholder="09xx xxx xxx">
                        </div>
                    </div>
                </div>

                <!-- YÊU CẦU -->
                <div class="flex flex-col gap-2">
                    <label class="font-display font-bold text-sm text-white/80 uppercase">Mục tiêu bạn hướng tới?</label>
                    <textarea id="client-req" rows="4" class="w-full p-4 bg-[#0a0a0a] border-2 border-white/20 rounded-xl text-white focus:border-neon-cyan outline-none transition-colors resize-none" placeholder="Hãy mô tả ngắn gọn bạn đang muốn xây dựng Web bán hàng, tối ưu SEO hay cần tư vấn hệ thống Marketing..."></textarea>
                </div>

                <!-- NÚT GỬI -->
                <div class="pt-4">
                    <button onclick="sendToZalo()" class="w-full py-4 bg-neon-cyan text-black font-extrabold text-lg md:text-xl rounded-2xl border-4 border-black shadow-[4px_4px_0_0_#fff] hover:translate-x-1 hover:-translate-y-1 hover:shadow-[6px_6px_0_0_#fff] transition-all uppercase flex justify-center items-center gap-3">
                        Gửi qua Zalo Đức Duy <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                    <p class="text-center text-[10px] md:text-xs text-white/30 mt-3 font-medium uppercase tracking-widest">Dữ liệu sẽ được chuyển trực tiếp sang ứng dụng Zalo</p>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-black py-8 border-t-4 border-white text-center">
        <p class="text-white/20 text-[10px] font-bold uppercase tracking-widest font-display">© 2026 DUC DUY. WEB ARCHITECT & SEO MASTER.</p>
    </footer>

    <script>
        lucide.createIcons();

        function sendToZalo() {
            const name = document.getElementById('client-name').value.trim();
            const phone = document.getElementById('client-phone').value.trim();
            const req = document.getElementById('client-req').value.trim();

            if (!name || !req) {
                alert("Vui lòng điền ít nhất Tên và Mục tiêu/Yêu cầu để mình dễ tư vấn nhé!");
                return;
            }

            // Tạo format tin nhắn
            const message = `Chào Đức Duy, tôi muốn nhận tư vấn dự án:\n- Tên/Đơn vị: ${name}\n- Số điện thoại: ${phone || 'Không để lại'}\n- Yêu cầu: ${req}`;

            // Cố gắng copy vào clipboard
            navigator.clipboard.writeText(message).then(() => {
                alert("Đã sao chép (copy) thông tin yêu cầu!\n\nHệ thống sẽ chuyển hướng bạn sang Zalo. Bạn chỉ cần nhấn Dán (Ctrl+V / Paste) vào khung chat và gửi cho Đức Duy nhé.");
                window.open('https://zalo.me/0938415218', '_blank');
            }).catch(err => {
                // Fallback nếu trình duyệt chặn copy
                window.open('https://zalo.me/0938415218', '_blank');
            });
        }
    </script>
</body>
</html>
